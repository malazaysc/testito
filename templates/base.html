<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}testito{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script defer src="https://unpkg.com/alpinejs@3.14.3/dist/cdn.min.js"></script>
<style>
  :root {
    --bg: #0e1116; --fg: #e6e6e6; --muted: #8b949e; --card: #161b22; --border: #30363d;
    --accent: #2f81f7; --pass: #2ea043; --fail: #f85149; --warn: #d29922; --skip: #6e7681;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--fg); line-height: 1.5; }
  header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; gap: 1.5rem; align-items: center; }
  header a { color: var(--fg); text-decoration: none; font-weight: 500; }
  header a:hover { color: var(--accent); }
  header .brand { font-weight: 700; color: var(--accent); }
  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  h1, h2, h3 { margin-top: 1.5rem; }
  code { background: #21262d; padding: 0.05rem 0.35rem; border-radius: 4px; font-size: 0.85em; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .btn, .btn-secondary {
    background: var(--accent); color: white; border: 0; padding: 0.4rem 0.85rem; border-radius: 6px;
    font-size: 0.85rem; font-weight: 500; text-decoration: none; display: inline-block;
  }
  .btn:hover, .btn-secondary:hover { filter: brightness(1.1); }
  .btn-secondary { background: #21262d; color: var(--fg); border: 1px solid var(--border); }
  .muted { color: var(--muted); font-size: 0.85rem; }
  .row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  th { color: var(--muted); font-weight: 500; font-size: 0.85rem; }
  ul.bare { list-style: none; padding: 0; margin: 0; }

  .pill { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.75rem; font-weight: 500; }
  .pill-pass    { background: rgba(46,160,67,.18);  color: var(--pass); }
  .pill-fail    { background: rgba(248,81,73,.18);  color: var(--fail); }
  .pill-warning { background: rgba(210,153,34,.18); color: var(--warn); }
  .pill-skipped { background: rgba(110,118,129,.2); color: var(--skip); }
  .pill-not_run { background: #21262d; color: var(--muted); }

  .counts-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.75rem 0 1rem; }

  /* test card / steps */
  .test-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.5rem; }
  .test-header {
    display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0.85rem;
  }
  .test-title { flex: 1; font-weight: 500; }
  .step-count { font-size: 0.8rem; }
  .test-body-wrap { padding: 0 0.85rem 0.6rem; border-top: 1px solid var(--border); }
  .test-body { padding-top: 0.6rem; }

  .steps { display: flex; flex-direction: column; gap: 0.3rem; }
  .step-row { padding: 0.5rem 0.6rem; background: #0d1117; border: 1px solid var(--border); border-radius: 5px; }
  .step-line { display: flex; align-items: center; gap: 0.5rem; }
  .step-text { flex: 1; }
  .step-time, .note-time { font-size: 0.72rem; }
  .step-note-display { margin-top: 0.3rem; padding: 0.4rem 0.55rem; background: #161b22; border-left: 2px solid var(--border); border-radius: 0 4px 4px 0; white-space: pre-wrap; font-size: 0.85rem; }

  .status-dot {
    display: inline-block; width: 0.55rem; height: 0.55rem; border-radius: 50%;
    flex-shrink: 0; background: #30363d;
  }
  .status-dot.status-pass    { background: var(--pass); }
  .status-dot.status-fail    { background: var(--fail); }
  .status-dot.status-warning { background: var(--warn); }
  .status-dot.status-skipped { background: var(--skip); }

  /* notes — stacked layout: header line above, body below at constrained width */
  .note-row {
    padding: 0.85rem 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .note-row:first-child { padding-top: 0.4rem; }
  .note-row:last-child { border-bottom: none; padding-bottom: 0.4rem; }
  .note-header { display: flex; gap: 0.6rem; align-items: center; margin-bottom: 0.45rem; }
  .note-text { max-width: 78ch; line-height: 1.55; }

  /* alpine cloak */
  [x-cloak] { display: none !important; }

  /* filter bar */
  .filter-bar { display: flex; gap: 0.5rem; padding: 0.6rem 0.85rem; }
  .filter-bar input[type=text] { flex: 1; padding: 0.4rem 0.6rem; background: #0d1117; color: var(--fg); border: 1px solid var(--border); border-radius: 5px; font-size: 0.85rem; }
  .filter-bar select { padding: 0.4rem 0.6rem; background: #0d1117; color: var(--fg); border: 1px solid var(--border); border-radius: 5px; font-size: 0.85rem; }
  input[type=text] { padding: 0.4rem 0.6rem; background: #0d1117; color: var(--fg); border: 1px solid var(--border); border-radius: 5px; font-size: 0.85rem; font-family: inherit; }
  select { padding: 0.4rem 0.6rem; background: #0d1117; color: var(--fg); border: 1px solid var(--border); border-radius: 5px; font-size: 0.85rem; font-family: inherit; }

  /* meta bar */
  .meta-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem; padding: 0.5rem 0.75rem; background: var(--card); border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; }
  .meta-bar code { font-size: 0.85em; }

  /* compare button menu */
  .compare-pick { position: relative; }
  .compare-pick summary { list-style: none; cursor: pointer; }
  .compare-pick summary::-webkit-details-marker { display: none; }
  .compare-menu { position: absolute; right: 0; top: 110%; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem; min-width: 240px; max-height: 360px; overflow: auto; z-index: 10; }
  .compare-menu a { display: block; padding: 0.35rem 0.5rem; color: var(--fg); text-decoration: none; border-radius: 4px; font-size: 0.85rem; }
  .compare-menu a:hover { background: rgba(255,255,255,.05); }

  .diff-row { background: rgba(210,153,34,.14); border-left: 3px solid var(--warn); }
  .diff-row td:first-child { padding-left: calc(0.75rem - 3px); }
  .compare-table tbody tr:hover { background: rgba(255,255,255,.02); }
  .compare-detail-row > td { background: #0d1117; padding: 0.6rem 1rem 0.9rem 2rem; }
  .step-diff-table { width: 100%; margin: 0.25rem 0; }
  .step-diff-table th, .step-diff-table td { padding: 0.35rem 0.6rem; font-size: 0.85rem; }
  .step-diff-table th { color: var(--muted); font-weight: 500; }

  .caret { transition: transform 0.15s; color: var(--muted); font-size: 0.75rem; display: inline-block; }
  .caret.open { transform: rotate(90deg); }

  .pill-in-scope { background: rgba(47,129,247,.18); color: var(--accent); }

  /* Kind chips — colored by triage priority. Bugs are loudest. */
  .pill-kind-bug      { background: rgba(248,81,73,.20);  color: var(--fail); border: 1px solid rgba(248,81,73,.45); }
  .pill-kind-polish   { background: rgba(210,153,34,.20); color: var(--warn); border: 1px solid rgba(210,153,34,.45); }
  .pill-kind-question { background: rgba(47,129,247,.18); color: var(--accent); border: 1px solid rgba(47,129,247,.40); }
  .pill-kind-info     { background: rgba(110,118,129,.18); color: #c9d1d9; border: 1px solid rgba(110,118,129,.40); }

  .kind-counts { display: inline-flex; gap: 0.35rem; text-decoration: none; }
  .kind-counts .pill { font-size: 0.78rem; padding: 0.2rem 0.55rem; }
  .kind-counts:hover .pill { filter: brightness(1.15); }

  /* Each note row has a thin colored accent on the left edge so the eye can
     scan a list of notes by kind without reading them. */
  .note-row { position: relative; padding-left: 0.7rem; }
  .note-row.note-kind-bug      { border-left: 3px solid var(--fail); }
  .note-row.note-kind-polish   { border-left: 3px solid var(--warn); }
  .note-row.note-kind-question { border-left: 3px solid var(--accent); }
  .note-row.note-kind-info     { border-left: 3px solid var(--border); }
  .note-scope { font-size: 0.78rem; }

  /* Findings banner — meant to be impossible to miss when notes exist */
  .findings-banner {
    display: flex; gap: 0.85rem; align-items: flex-start;
    background: rgba(210,153,34,.12);
    border: 1px solid var(--warn);
    border-left: 4px solid var(--warn);
    border-radius: 6px; padding: 0.85rem 1rem;
    margin: 1rem 0 0.5rem;
  }
  .findings-banner-icon { font-size: 1.4rem; line-height: 1; padding-top: 0.1rem; }
  .findings-banner-text strong { color: var(--warn); }

  .empty-state { padding: 0.6rem 0.85rem; }

  /* counts cell on home table — vertically center the pills so they don't float
     at the top of rows that are taller because of multi-line descriptions. */
  td.counts-cell { vertical-align: middle; white-space: nowrap; }
  td.counts-cell .pill { margin-right: 0.25rem; }

  /* markdown content */
  .md-content > :first-child { margin-top: 0; }
  .md-content > :last-child  { margin-bottom: 0; }
  .md-content p { margin: 0.5rem 0; }
  /* inline code is softened so it doesn't visually shred a paragraph; the
     fenced-block code keeps the harder contrast since it's a deliberate block */
  .md-content code {
    background: rgba(255,255,255,.04);
    color: #cdd6e0;
    padding: 0.05rem 0.3rem;
    border-radius: 3px;
    font-size: 0.88em;
    word-break: break-word;
  }
  .md-content pre {
    background: #0d1117; border: 1px solid var(--border);
    padding: 0.55rem 0.75rem; border-radius: 5px;
    overflow-x: auto; font-size: 0.85em;
    margin: 0.6rem 0;
  }
  .md-content pre code {
    background: transparent; padding: 0; color: var(--fg);
    font-size: 1em;
  }
  .md-content ul, .md-content ol { margin: 0.45rem 0 0.45rem 1.4rem; padding: 0; }
  .md-content li { margin: 0.18rem 0; }
  .md-content blockquote { margin: 0.5rem 0; padding: 0.25rem 0.75rem; border-left: 2px solid var(--border); color: var(--muted); }
  .md-content a { color: var(--accent); }
  .md-content table { margin: 0.5rem 0; }
  .md-content table td, .md-content table th { padding: 0.25rem 0.5rem; }
  /* sub-headings inside a note get visual weight so the eye can find structure */
  .md-content h1, .md-content h2 { font-size: 1.05em; font-weight: 600; margin: 0.85rem 0 0.3rem; }
  .md-content h3, .md-content h4 { font-size: 1em;    font-weight: 600; margin: 0.7rem 0 0.25rem; }
  .md-content h5, .md-content h6 { font-size: 0.95em; font-weight: 600; margin: 0.55rem 0 0.2rem; }
  .md-content strong { color: #f0f6fc; }
</style>
</head>
<body>
<header>
  <a href="/" class="brand">testito</a>
  <a href="/">Runs</a>
</header>
<main>
{% block body %}{% endblock %}
</main>
</body>
</html>

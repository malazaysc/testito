<div class="feedback-item feedback-author-{{ feedback.author.as_str() }}" data-feedback-id="{{ feedback.id }}">
  <div class="feedback-item-header">
    <span class="pill pill-feedback">{{ feedback.author.label() }}</span>
    <span class="muted feedback-time" title="{{ feedback.created_at }}">{{ relative_created }}</span>
  </div>
  <div class="feedback-text md-content">{{ text_html|safe }}</div>
</div>

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build · ${{ matrix.suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            suffix: macos-aarch64
          - target: x86_64-apple-darwin
            os: macos-13
            suffix: macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
          rustup default stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="testito-${version}-${{ matrix.suffix }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/testito" "dist/$name/"
          cp README.md LICENSE.md 2>/dev/null || true
          # LICENSE.md may not exist yet; ignore
          ( cd dist && tar -czf "$name.tar.gz" "$name" )
          # platform-appropriate sha256 binary
          if command -v shasum >/dev/null; then
            ( cd dist && shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256" )
          else
            ( cd dist && sha256sum "$name.tar.gz" > "$name.tar.gz.sha256" )
          fi
          echo "asset_path=dist/$name.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha_path=dist/$name.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: |
            ${{ steps.package.outputs.asset_path }}
            ${{ steps.package.outputs.sha_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.sha256
          draft: false
          generate_release_notes: true
